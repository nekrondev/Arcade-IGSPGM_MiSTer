name: Build Core

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  synthesis:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run compilation flow
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            raetro/quartus:17.0 \
            quartus_sh --flow compile Arcade-IGSPGM.qpf

      - name: Upload RBF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arcade-IGSPGM-rbf
          path: output_files/Arcade-IGSPGM.rbf
          if-no-files-found: error

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            output_files/*.rpt
            output_files/*.summary
